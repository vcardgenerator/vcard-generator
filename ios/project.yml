name: VCardGenerator
options:
  bundleIdPrefix: com.vcardgenerator
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.3"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  VCardGenerator:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: VCardGenerator
    info:
      path: VCardGenerator/Info.plist
      properties:
        CFBundleName: vCard Generator
        CFBundleDisplayName: vCard Generator
        UILaunchScreen:
          UIColorName: ""
        NSPhotoLibraryUsageDescription: "Choose an icon image for your vCard button."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vcardgenerator.app
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets: []
