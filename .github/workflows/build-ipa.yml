name: Build Unsigned IPA

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ipa.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write          # needed to publish the IPA as a Release asset

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Select latest available Xcode ─────────────────────────────────────
      - name: Select Xcode
        run: |
          # Pick the highest-versioned Xcode available on the runner
          XCODE_PATH=$(ls /Applications | grep -E '^Xcode' | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "/Applications/$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      # ── 3. Install XcodeGen ───────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 4. Generate .xcodeproj ────────────────────────────────────────────────
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate --spec project.yml

      # ── 5. Archive (unsigned) ─────────────────────────────────────────────────
      - name: Archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -project VCardGenerator.xcodeproj \
            -scheme VCardGenerator \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/VCardGenerator.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            ONLY_ACTIVE_ARCH=NO

      # ── 6. Repack .app → .ipa ─────────────────────────────────────────────────
      - name: Repack to IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/VCardGenerator.xcarchive/Products" \
            -name "*.app" -maxdepth 3 | head -1)
          echo "Found app: $APP_PATH"

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"

          cd "$RUNNER_TEMP"
          zip -r VCardGenerator.ipa Payload/
          echo "IPA size: $(du -sh VCardGenerator.ipa | cut -f1)"

      # ── 7. Upload artifact (GitHub always wraps artifacts in a .zip) ──────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCardGenerator
          path: ${{ runner.temp }}/VCardGenerator.ipa
          retention-days: 30

      # ── 8. Publish a rolling "latest" Release with the raw .ipa ───────────────
      #     Release assets are a direct download (no surrounding .zip).
      - name: Publish IPA to Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP"
          NOTES="Unsigned IPA built from ${GITHUB_SHA:0:7} on $(date -u '+%Y-%m-%d %H:%M UTC')."
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest VCardGenerator.ipa \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit latest --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          else
            gh release create latest VCardGenerator.ipa \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest Build" \
              --notes "$NOTES"
          fi
